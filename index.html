<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나눔QT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
    <div id="app" class="max-w-2xl mx-auto space-y-4">
        <h1 class="text-2xl font-bold">🕊️ 나눔QT</h1>
        <div id="loader" class="text-center p-10 font-bold">데이터 불러오는 중...</div>
        <div id="main-ui" class="hidden space-y-4">
            <input type="date" id="qt-date" onchange="renderApp()" class="w-full p-2 border rounded">
            <div id="praise-box" class="bg-white p-4 rounded-lg border shadow-sm"></div>
            <div id="verses-box" class="bg-white p-4 rounded-lg border shadow-sm h-64 overflow-y-auto text-sm"></div>
        </div>
    </div>

    <script>
        let bible = [], praise = [];
        
        // 파일 로딩
        async function loadFiles() {
            const b = await new Promise(r => Papa.parse("bible.csv", { download: true, complete: r }));
            const p = await new Promise(r => Papa.parse("praise.csv", { download: true, complete: r }));
            bible = b.data.filter(r => r.length >= 5);
            praise = p.data.filter(r => r.length >= 3);
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            renderApp();
        }

        function renderApp() {
            const d = new Date(document.getElementById('qt-date').value || new Date());
            const day = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
            
            // 찬양
            const p = praise[(day * 103 + 401) % praise.length];
            document.getElementById('praise-box').innerHTML = `<div class="font-bold">${p[1]}</div><div class="text-xs text-gray-500">${p[2]}</div>`;
            
            // 말씀 (20절)
            const start = (day * 20) % bible.length;
            document.getElementById('verses-box').innerHTML = bible.slice(start, start+20).map(v => `<div>${v[3]} : ${v[4]}</div>`).join('');
        }
        
        loadFiles();
    </script>
</body>
</html>
