<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나눔QT | 매일의 은혜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-stone-50 text-stone-900 pb-20">
    <div class="max-w-xl mx-auto p-4 space-y-8">
        <header class="text-center py-6">
            <h1 class="text-3xl font-black text-emerald-900">🕊️ 나눔QT</h1>
            <input type="date" id="qt-date" onchange="render()" class="mt-2 bg-transparent text-sm font-bold border-b border-stone-300">
        </header>

        <div id="loader" class="text-center py-20 text-emerald-700 font-bold">데이터를 불러오는 중입니다...</div>

        <div id="ui" class="hidden space-y-8">
            <section class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                <h2 class="text-xs font-bold text-emerald-600 mb-3 tracking-widest uppercase">1단계 : 찬양하기</h2>
                <div id="praise-box" class="space-y-1"></div>
            </section>

            <section class="bg-white p-6 rounded-3xl shadow-sm border border-emerald-100">
                <h2 class="text-xs font-bold text-emerald-600 mb-3 tracking-widest uppercase">2단계 : 말씀 읽기</h2>
                <div id="passage-range" class="font-bold text-lg mb-4 text-stone-700"></div>
                <div id="verses-box" class="text-stone-700 leading-relaxed space-y-2"></div>
            </section>

            <section class="space-y-4">
                <h2 class="text-xs font-bold text-emerald-600 tracking-widest uppercase">3~6단계 : 묵상과 기도</h2>
                <textarea id="s3" class="w-full p-4 rounded-2xl border bg-white" rows="2" placeholder="3. 묵상 - 이 말씀을 통해 하시고자 하는 말씀이 무엇이라고 생각하나요?"></textarea>
                <textarea id="s4" class="w-full p-4 rounded-2xl border bg-white" rows="2" placeholder="4. 적용 - 내 삶에 어떻게 적용할 수 있을까요?"></textarea>
                <textarea id="s5" class="w-full p-4 rounded-2xl border bg-white" rows="2" placeholder="5. 기록 - 이 말씀에서 느껴지는 바는 무엇인가요?"></textarea>
                <textarea id="s6" class="w-full p-4 rounded-2xl border bg-white" rows="2" placeholder="6. 기도 - 오늘 나만의 기도를 적어보세요."></textarea>
            </section>

            <button onclick="copy()" class="w-full bg-emerald-900 text-white p-5 rounded-2xl font-bold hover:bg-emerald-800 transition">📋 7단계 : 오늘의 QT 공유하기</button>
            
            <footer class="text-center text-stone-400 text-xs py-4">
                Made by BAE JUN HO
            </footer>
        </div>
    </div>

    <script>
        let B = [], P = [];
        Promise.all([
            new Promise(r => Papa.parse("https://raw.githubusercontent.com/badako94/open-qt/main/bible.csv", { download: true, complete: r })),
            new Promise(r => Papa.parse("https://raw.githubusercontent.com/badako94/open-qt/main/praise.csv", { download: true, complete: r }))
        ]).then(res => {
            B = res[0].data.filter(r => r.length >= 5);
            P = res[1].data.filter(r => r.length >= 3);
            document.getElementById('loader').classList.add('hidden');
            document.getElementById('ui').classList.remove('hidden');
            document.getElementById('qt-date').value = new Date().toISOString().split('T')[0];
            render();
        });

        function render() {
            const d = new Date(document.getElementById('qt-date').value);
            const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
            
            const p = P[seed % P.length];
            document.getElementById('praise-box').innerHTML = `<div class="text-lg font-bold text-stone-900">${p[1]}</div><div class="text-sm text-stone-500">${p[2]}</div>`;
            
            const start = (seed * 12345) % (B.length - 15);
            // 10~15절 사이로 동적 조절
            const count = 10 + (seed % 6);
            const verses = B.slice(start, start + count);
            document.getElementById('passage-range').innerText = `${verses[0][3]} ~ ${verses[count-
