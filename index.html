<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나눔QT | 매일의 은혜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-size: 16px; line-height: 1.6; }
        @media (min-width: 768px) { textarea { font-size: 18px; } .content-text { font-size: 18px; } }
    </style>
</head>
<body class="bg-stone-50 text-stone-900 pb-20 font-sans">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-8">
        <header class="text-center py-6">
            <h1 class="text-4xl font-black text-emerald-900">🕊️ 나눔QT</h1>
            <input type="date" id="qt-date" onchange="render()" class="mt-4 bg-transparent text-lg font-bold border-b border-stone-300">
        </header>

        <div id="ui" class="space-y-8">
            <!-- 1단계: 찬양 -->
            <section class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-stone-100">
                <h2 class="text-xs font-bold text-emerald-600 mb-3 tracking-widest uppercase">1단계 : 찬양하기</h2>
                <a id="praise-link" href="#" target="_blank" class="block hover:opacity-70 transition">
                    <div id="praise-title" class="font-bold text-xl md:text-2xl text-emerald-900 underline underline-offset-4">로딩 중...</div>
                    <div id="praise-singer" class="text-base text-stone-500 font-normal mt-1"></div>
                </a>
            </section>

            <!-- 2단계: 말씀 -->
            <section class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-stone-100">
                <h2 class="text-xs font-bold text-emerald-600 mb-3 tracking-widest uppercase">2단계 : 말씀 읽기</h2>
                <div id="passage-range" class="font-bold text-xl mb-4 text-stone-700"></div>
                <div id="verses-box" class="text-stone-700 leading-relaxed space-y-3 text-base md:text-lg content-text"></div>
            </section>

            <!-- 3단계: 묵상과 기록 -->
            <section class="space-y-4">
                <h2 class="text-xs font-bold text-emerald-600 tracking-widest uppercase">3단계 : 묵상과 기록</h2>
                <textarea id="s1" class="w-full p-4 md:p-6 rounded-2xl border text-base md:text-lg" rows="2" placeholder="1. 묵상 - 이 말씀을 통해 하시고자 하는 말씀이 무엇일까요?"></textarea>
                <textarea id="s2" class="w-full p-4 md:p-6 rounded-2xl border text-base md:text-lg" rows="2" placeholder="2. 적용 - 내 삶에 어떻게 적용 할 수 있을까요?"></textarea>
                <textarea id="s3" class="w-full p-4 md:p-6 rounded-2xl border text-base md:text-lg" rows="2" placeholder="3. 교감 - 이 말씀에서 느껴지는게 있나요?"></textarea>
                <textarea id="s4" class="w-full p-4 md:p-6 rounded-2xl border text-base md:text-lg" rows="2" placeholder="4. 기도 - 오늘의 기도 제목은 무엇인가요?"></textarea>
                <textarea id="s5" class="w-full p-4 md:p-6 rounded-2xl border text-base md:text-lg" rows="2" placeholder="5. 감사일기 - 오늘의 감사 할 일들을 남겨보아요!"></textarea>
            </section>

            <button onclick="copy()" class="w-full bg-emerald-900 text-white p-6 rounded-2xl font-bold text-lg hover:bg-emerald-800 transition">📋 오늘의 QT 공유하기</button>
            <footer class="text-center text-stone-400 text-sm py-4">Made by BAE JUN HO</footer>
        </div>
    </div>

    <script>
        let B = [], P = [];
        Papa.parse("https://raw.githubusercontent.com/badako94/open-qt/main/bible.csv", { download: true, complete: res => { B = res.data; render(); } });
        Papa.parse("https://raw.githubusercontent.com/badako94/open-qt/main/praise.csv", { download: true, complete: res => { P = res.data; render(); } });

        window.onload = () => {
            const today = new Date();
            const offset = today.getTimezoneOffset() * 60000;
            const koreaTime = new Date(today.getTime() - offset);
            document.getElementById('qt-date').value = koreaTime.toISOString().split('T')[0];
            render();
        };

        function render() {
            if(B.length < 2 || P.length < 2) return;
            const dateVal = document.getElementById('qt-date').value;
            const parts = dateVal.split('-');
            const d = new Date(parts[0], parts[1] - 1, parts[2]);
            const seed = d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
            
            const p = P[seed % P.length];
            document.getElementById('praise-title').innerText = p[1] + " 🔍";
            document.getElementById('praise-singer').innerText = p[2];
            document.getElementById('praise-link').href = `https://www.youtube.com/results?search_query=${encodeURIComponent(p[1])}`;
            
            const filteredB = B.filter(r => r.length >= 5);
            const start = (seed * 12345) % (filteredB.length - 15);
            const count = 10 + (seed % 6);
            const verses = filteredB.slice(start, start + count);
            
            document.getElementById('passage-range').innerText = `${verses[0][3]} ~ ${verses[count-1][2]}절`;
            document.getElementById('verses-box').innerHTML = verses.map(v => `<div><span class="text-emerald-700 font-bold mr-2">${v[2]}</span>${v[4]}</div>`).join('');
        }

        function copy() {
            const range = document.getElementById('passage-range').innerText;
            const t = `[나눔QT] ${document.getElementById('qt-date').value}\n📖 말씀 범위: ${range}\n\n1. 묵상: ${s1.value}\n2. 적용: ${s2.value}\n3. 교감: ${s3.value}\n4. 기도: ${s4.value}\n5. 감사일기: ${s5.value}`;
            navigator.clipboard.writeText(t); 
            alert('요약카드가 복사되었습니다. 붙여넣기 하세요!');
        }
    </script>
</body>
</html>
